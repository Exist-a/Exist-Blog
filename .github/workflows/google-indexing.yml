name: Google Indexing

on:
  # listen to deploy workflow, only fire after it succeeds
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: gsc-indexing
  cancel-in-progress: false

jobs:
  index:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deploy commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      - name: Install JS deps & build
        run: npm install --no-audit --no-fund && npm run build

      - name: Submit URLs to Google Indexing API
        env:
          GOOGLE_PROJECT_ID: ${{ secrets.GOOGLE_PROJECT_ID }}
          GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
        run: |
          # `set -x` 让 bash 打印每条执行的命令，便于在日志里看出
          # python 是否启动 / import 卡死 / 哪一行报错。
          set -x
          python scripts/google_indexing.py 2>&1 || echo "EXIT_CODE=$?"
